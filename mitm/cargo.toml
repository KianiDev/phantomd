[package]
name = "phantomd-mitm"
version = "0.1.0"
edition = "2021"

[dependencies]
# Async runtime
tokio = { version = "1", features = ["full"] }
tokio-util = "0.7"
futures-util = "0.3"

# TLS and certificate generation
rustls = { version = "0.23", features = ["dangerous_configuration"] }
rustls-pemfile = "2"
hyper-rustls = { version = "0.27", features = ["http1", "http2", "rustls-native-certs"] }
rcgen = "0.13"
webpki-roots = "0.26"

# HTTP handling
hyper = { version = "1", features = ["full", "http1", "http2", "client", "server", "runtime"] }
http = "1"
bytes = "1"
http-body-util = "0.1"

# Configuration
serde = { version = "1", features = ["derive"] }
toml = "0.8"

# HTML injection
html5ever = "0.26"
tendril = "0.4"
markup5ever = "0.11"

# Logging
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

# Error handling
thiserror = "1.0"
anyhow = "1.0"

# Utilities
arc-swap = "1"
lazy_static = "1.7"
regex = "1"

[profile.release]
lto = true
codegen-units = 1
opt-level = 3   